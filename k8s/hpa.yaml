apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: ai-agent-hpa
  namespace: ai-platform

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-agent

  minReplicas: 2
  maxReplicas: 5

  metrics:
  - type: Resource
    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 70
